name: Build and Deploy code

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    #environment:
     # name: testing

    env:
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_HOSTNAME: postgres
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ALGORITHM: ${{ secrets.ALGORITHM }}
      TOKEN_EXPIRATION_TIME: ${{ secrets.TOKEN_EXPIRATION_TIME }}

    services:
      postgres:
        image: postgres

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}_test

        ports:
          - 5432:5432

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Dependencies
        run: pip install -r requirements.txt

      # ---------------- DEBUGGING ----------------

      - name: Debug Environment Variables
        run: |
          echo "HOST=$DB_HOSTNAME"
          echo "USER=$DB_USERNAME"
          echo "PORT=$DB_PORT"
          echo "DB=$DB_NAME"

      - name: Check PostgreSQL Host
        run: |
          getent hosts postgres || true
      
      - name: Check Docker Containers
        run: docker ps -a

      - name: Show PostgreSQL Logs
        run: docker logs $(docker ps -aq --filter "ancestor=postgres") || true

     
      - name: Verify DB Connection
        run: |
          python - <<EOF
          import os
          import psycopg2

          print("HOST =", os.environ["DB_HOSTNAME"])
          print("USER =", os.environ["DB_USERNAME"])
          print("DB   =", os.environ["DB_NAME"])

          conn = psycopg2.connect(
              host=os.environ["DB_HOSTNAME"],
              user=os.environ["DB_USERNAME"],
              password=os.environ["DB_PASSWORD"],
              port=os.environ["DB_PORT"],
              dbname=os.environ["DB_NAME"] + "_test"
          )

          print("DATABASE CONNECTED SUCCESSFULLY")
          conn.close()
          EOF

      # ---------------- TEST ----------------

      - name: Run Pytest
        run: |
          pip install pytest
          pytest

      
