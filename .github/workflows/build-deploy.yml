name: Build and Deploy Code

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DB_USERNAME: postgres
      DB_HOSTNAME: postgres
      DB_PORT: "5432"
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_NAME: ${{ secrets.DB_NAME }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
      ALGORITHM: ${{ secrets.ALGORITHM }}
      TOKEN_EXPIRATION_TIME: ${{ secrets.TOKEN_EXPIRATION_TIME }}

    services:
      postgres:
        image: postgres:16

        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}_test

        ports:
          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h postgres -p 5432 -U postgres
          do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done

      - name: Print Environment
        run: |
          python -c "import os; print('HOST=', os.getenv('DB_HOSTNAME')); print('USER=', os.getenv('DB_USERNAME')); print('PORT=', os.getenv('DB_PORT')); print('DB=', os.getenv('DB_NAME'))"

      - name: Test PostgreSQL Connection
        run: |
          python -c "import os, psycopg2; conn = psycopg2.connect(host=os.environ['DB_HOSTNAME'], user=os.environ['DB_USERNAME'], password=os.environ['DB_PASSWORD'], port=os.environ['DB_PORT'], dbname=os.environ['DB_NAME'] + '_test'); print('DATABASE CONNECTED SUCCESSFULLY'); conn.close()"

      - name: Run Tests
        run: |
          pytest